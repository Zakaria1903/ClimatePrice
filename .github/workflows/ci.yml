name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install geopandas pandas numpy scikit-learn xgboost pytest ruff

      - name: Ruff lint (fails on any error)
        run: ruff check .

      - name: Ruff format check (fails if unformatted)
        run: ruff format --check .

      - name: Generate synthetic data
        run: python src/01_synthetic_data.py

      - name: Run pipeline
        run: python src/03_pipeline.py

      - name: Run tests (fails on any failure)
        run: pytest tests/ -v
